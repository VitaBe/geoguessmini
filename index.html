<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest - Location Guessing Game</title>
    <!-- 1. Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- 2. Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Upload View -->
        <div id="upload-view" class="view active">
            <div class="container">
                <h1>GeoQuest</h1>
                <p class="subtitle">Guess the location from photos</p>
                <div class="upload-box">
                    <label for="zip-input" class="upload-label">
                        <span class="upload-icon">📁</span>
                        <span class="upload-text">Choose a ZIP file</span>
                        <span class="upload-hint">Contains data.csv + images</span>
                    </label>
                    <input type="file" id="zip-input" accept=".zip" hidden>
                </div>
                <div id="upload-error" class="error-message hidden"></div>
                <div class="instructions">
                    <h3>How to play:</h3>
                    <ol>
                        <li>Upload a ZIP file with a <code>data.csv</code> and images</li>
                        <li>Look at each photo and description</li>
                        <li>Click on the map where you think it was taken</li>
                        <li>Get within 200km to advance!</li>
                    </ol>
                </div>
            </div>
        </div>

        <!-- Game View -->
        <div id="game-view" class="view">
            <div class="game-container">
                <div class="photo-section">
                    <img id="game-photo" src="" alt="Location photo">
                    <p id="game-description"></p>
                </div>
                <div class="map-section">
                    <div id="map"></div>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                    <span id="progress-text">1 / 5</span>
                </div>
            </div>
        </div>

        <!-- Final View -->
        <div id="final-view" class="view">
            <div class="container final-container">
                <div id="final-message"></div>
                <button id="replay-btn" class="btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <!-- 3. JSZip -->
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <!-- 4. PapaParse -->
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <!-- 5. Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- 6. Application JS -->
    <script src="js/utils.js"></script>
    <script src="js/zipLoader.js"></script>
    <script src="js/csvParser.js"></script>
    <script src="js/mapView.js"></script>
    <script src="js/gameState.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
